name: Code Quality & Testing

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

# Cancel superseded runs on the same ref to avoid piling up parallel jobs.
concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      CI: true
      PAYLOAD_SECRET: test-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      DATABASE_URI: mongodb://127.0.0.1:27017/test

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'" --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.next/cache
        key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Chromium (with deps)
      run: npx playwright install --with-deps chromium
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Type checking
      run: npm run generate:types && npx tsc --noEmit
      
    - name: Run integration tests
      run: npm run test:int

    - name: Run e2e tests
      env:
        NODE_OPTIONS: --no-deprecation
      run: npx playwright test --reporter=line
      
    - name: Build verification
      run: npm run build
