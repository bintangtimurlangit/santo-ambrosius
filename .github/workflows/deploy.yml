name: Build, Publish & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Serialize deploys so two pushes can't race on the VPS (don't cancel a
# deploy that is already mid-flight).
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/bintangtimurlangit/santo-ambrosius

jobs:
  # 1) Build the production Docker image once in CI and publish it to GHCR.
  #    The image build runs `npm run build`, so this is also the build gate.
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      packages: write   # push the image to GHCR
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=sha,prefix=sha-,format=long

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          NEXT_PUBLIC_SITE_URL=https://santoambrosius.org
          NEXT_PUBLIC_SERVER_URL=https://santoambrosius.org

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        generate_release_notes: true
        body: |
          Published image: `${{ env.IMAGE_NAME }}:sha-${{ github.sha }}`

  # 2) Deploy: the VPS only pulls + runs the published image (no build).
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      packages: read    # pull the image from GHCR
    steps:
    # script_path (below) uploads scripts/deploy-remote.sh from the checkout,
    # so the deploy job needs the repo on the runner.
    - name: Checkout code
      uses: actions/checkout@v4

    # The remote deploy logic lives in scripts/deploy-remote.sh. Both the
    # primary attempt and the retry run the exact same script.
    - name: Deploy to VPS
      id: deploy
      continue-on-error: true
      uses: appleboy/ssh-action@v1.0.3
      env:
        GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GHCR_USER: ${{ github.actor }}
        IMAGE_TAG: sha-${{ github.sha }}
        VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        GITHUB_REPO: ${{ github.repository }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        timeout: 60s          # SSH connect timeout (was the default 30s that timed out)
        command_timeout: 15m
        envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG,VPS_APP_DIR,GITHUB_REPO
        script_path: scripts/deploy-remote.sh

    # Retry once on a transient SSH/network failure (e.g. "dial tcp :22 i/o
    # timeout"). The script is idempotent, so re-running it is safe.
    - name: Deploy to VPS (retry)
      if: steps.deploy.outcome == 'failure'
      uses: appleboy/ssh-action@v1.0.3
      env:
        GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GHCR_USER: ${{ github.actor }}
        IMAGE_TAG: sha-${{ github.sha }}
        VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        GITHUB_REPO: ${{ github.repository }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        timeout: 60s
        command_timeout: 15m
        envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG,VPS_APP_DIR,GITHUB_REPO
        script_path: scripts/deploy-remote.sh

    - name: Production Status
      run: |
        echo "🚀 Deployed ${{ env.IMAGE_NAME }}:sha-${{ github.sha }} to production"
        echo "Commit: ${{ github.sha }}"
        echo "Deployed at: $(date -u)"
